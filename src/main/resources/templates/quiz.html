<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Quiz Generator | AI Study Assistant</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #eef4ff, #f8fbff);
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }

        .navbar-custom {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08);
        }

        .main-card {
            border: none;
            border-radius: 24px;
            box-shadow: 0 14px 32px rgba(0, 0, 0, 0.08);
        }

        .quiz-box {
            background: #f8f9fa;
            border-left: 5px solid #0d6efd;
            border-radius: 12px;
            padding: 18px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-custom sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold text-primary" th:href="@{/dashboard}">AI Study Assistant</a>

        <div class="d-flex gap-2">
            <a th:href="@{/dashboard}" class="btn btn-outline-secondary">Dashboard</a>
            <a th:href="@{/notes}" class="btn btn-outline-primary">My Notes</a>
            <a th:href="@{/ask-ai}" class="btn btn-outline-success">Ask AI</a>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="btn btn-outline-danger">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container py-5">

    <div class="card main-card p-4 mb-4">
        <h1 class="mb-3">AI Quiz Generator</h1>
        <p class="text-muted">
            Generate quiz questions automatically from your saved study notes.
        </p>

        <form th:action="@{/quiz}" method="post">
            <button type="submit" class="btn btn-primary btn-lg">Generate Quiz from My Notes</button>
        </form>
    </div>

    <div th:if="${quiz}" class="card main-card p-4">
        <h3 class="mb-3">Generated Quiz</h3>
        <div class="quiz-box" th:text="${quiz}"></div>
    </div>

</div>

</body>
</html>
