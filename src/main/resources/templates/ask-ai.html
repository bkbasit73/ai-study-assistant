<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Ask AI | AI Study Assistant</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #eef4ff, #f8fbff);
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }

        .navbar-custom {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08);
        }

        .main-card {
            border: none;
            border-radius: 24px;
            box-shadow: 0 14px 32px rgba(0, 0, 0, 0.08);
        }

        .chat-card {
            border: none;
            border-radius: 18px;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.06);
        }

        .question-box {
            background: #f1f6ff;
            border-left: 5px solid #0d6efd;
            border-radius: 12px;
            padding: 14px;
        }

        .answer-box {
            background: #f8f9fa;
            border-left: 5px solid #198754;
            border-radius: 12px;
            padding: 14px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-custom sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold text-primary" th:href="@{/dashboard}">AI Study Assistant</a>

        <div class="d-flex gap-2">
            <a th:href="@{/dashboard}" class="btn btn-outline-secondary">Dashboard</a>
            <a th:href="@{/notes}" class="btn btn-outline-primary">My Notes</a>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="btn btn-outline-danger">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container py-5">

    <div class="card main-card p-4 mb-4">
        <h1 class="mb-3">Ask AI Study Assistant</h1>
        <p class="text-muted">Ask your study question and review your previous AI conversations.</p>

        <form th:action="@{/ask-ai}" method="post">
            <div class="mb-3">
                <label for="question" class="form-label">Ask your question</label>
                <textarea id="question" name="question" class="form-control" rows="4" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Ask AI</button>
        </form>
    </div>

    <div th:if="${question}" class="card main-card p-4 mb-4">
        <h3 class="mb-3">Latest Response</h3>

        <div class="question-box mb-3">
            <strong>Question:</strong>
            <p class="mb-0" th:text="${question}"></p>
        </div>

        <div class="answer-box">
            <strong>AI Answer:</strong>
            <p class="mb-0" th:text="${answer}"></p>
        </div>
    </div>

    <div class="mt-4">
        <h3 class="mb-3">Your Chat History</h3>

        <div th:if="${#lists.isEmpty(chatHistory)}" class="alert alert-info">
            No AI chat history yet.
        </div>

        <div th:each="chat : ${chatHistory}" class="card chat-card p-4 mb-3">
            <p class="text-muted mb-2">
                <strong>Asked on:</strong>
                <span th:text="${chat.createdAt}"></span>
            </p>

            <div class="question-box mb-3">
                <strong>Question:</strong>
                <p class="mb-0" th:text="${chat.question}"></p>
            </div>

            <div class="answer-box">
                <strong>Answer:</strong>
                <p class="mb-0" th:text="${chat.answer}"></p>
            </div>
        </div>
    </div>

</div>

</body>
</html>
