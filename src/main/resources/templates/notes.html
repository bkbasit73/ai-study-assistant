<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Notes | AI Study Assistant</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #eef4ff, #f8fbff);
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }

        .navbar-custom {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08);
        }

        .main-card {
            border: none;
            border-radius: 24px;
            box-shadow: 0 14px 32px rgba(0, 0, 0, 0.08);
        }

        .note-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 22px rgba(0, 0, 0, 0.06);
        }

        .note-content {
            white-space: pre-wrap;
            color: #495057;
        }

        .form-control {
            border-radius: 14px;
            padding: 12px;
        }

        .btn-rounded {
            border-radius: 12px;
            padding: 10px 18px;
            font-weight: 600;
        }

        .section-title {
            font-weight: 700;
        }

        .empty-box {
            background: #f8f9fa;
            border-left: 5px solid #0d6efd;
            border-radius: 14px;
            padding: 16px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-custom sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold text-primary" th:href="@{/dashboard}">
            AI Study Assistant
        </a>

        <div class="d-flex gap-2">
            <a th:href="@{/dashboard}" class="btn btn-outline-secondary btn-rounded">Dashboard</a>
            <a th:href="@{/ask-ai}" class="btn btn-outline-success btn-rounded">Ask AI</a>
            <a th:href="@{/quiz}" class="btn btn-outline-primary btn-rounded">Quiz</a>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="btn btn-outline-danger btn-rounded">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container py-5">

    <div class="card main-card p-4 p-md-5 mb-4">
        <h1 class="mb-3">My Study Notes</h1>
        <p class="text-muted mb-4">
            Create and organize your personal study notes for AI-powered learning.
        </p>

        <form th:action="@{/notes}" method="post">
            <div class="mb-3">
                <label for="title" class="form-label fw-semibold">Title</label>
                <input type="text" id="title" name="title" class="form-control" placeholder="Enter note title" required>
            </div>

            <div class="mb-3">
                <label for="content" class="form-label fw-semibold">Content</label>
                <textarea id="content" name="content" rows="6" class="form-control" placeholder="Write your study note here..." required></textarea>
            </div>

            <button type="submit" class="btn btn-primary btn-rounded">Save Note</button>
        </form>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="section-title mb-0">Saved Notes</h2>
    </div>

    <div th:if="${#lists.isEmpty(notes)}" class="empty-box">
        No notes found yet. Add your first study note above.
    </div>

    <div th:each="note : ${notes}" class="card note-card p-4 mb-3">
        <h4 class="fw-bold mb-2" th:text="${note.title}"></h4>
        <p class="note-content mb-0" th:text="${note.content}"></p>
    </div>

</div>

</body>
</html>
